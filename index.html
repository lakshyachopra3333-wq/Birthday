
<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday ❤️</title>
<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;
  overflow: hidden;
}

h1 {
  font-size: 45px;
  text-shadow: 0 0 20px white;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px white; }
  to { text-shadow: 0 0 30px yellow; }
}

p {
  font-size: 18px;
  margin: 5px;
}

.cake {
  margin-top: 20px;
  position: relative;
}

.candle {
  width: 12px;
  height: 45px;
  background: white;
  margin: auto;
  position: relative;
  border-radius: 3px;
}

.flame {
  width: 18px;
  height: 18px;
  background: orange;
  border-radius: 50%;
  position: absolute;
  top: -18px;
  left: -3px;
  animation: flicker 0.2s infinite alternate;
}

@keyframes flicker {
  from { transform: scale(1); opacity: 1; }
  to { transform: scale(1.3); opacity: 0.7; }
}

button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: white;
  color: #ff4e50;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

.hidden {
  display: none;
}

#finalMessage {
  margin-top: 20px;
  font-size: 20px;
  animation: fadeIn 2s ease-in-out;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* Floating Hearts */
.heart {
  position: absolute;
  color: white;
  font-size: 20px;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>Happy Birthday 🎂💖</h1>
<p>You are my most special person ✨</p>
<p>I love you so much ❤️</p>

<div class="cake">
  <div class="candle">
    <div class="flame" id="flame"></div>
  </div>
</div>

<button onclick="blowCandle()">Blow the Candle 🕯️✨</button>

<div id="finalMessage" class="hidden">
  💫 Make a wish... 💖 <br>
  I love you so much ❤️ <br>
  I love you forever 💕
</div>

<script>
function blowCandle() {
  document.getElementById("flame").style.display = "none";
  document.getElementById("finalMessage").classList.remove("hidden");
}

// Create floating hearts
setInterval(function() {
  var heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 15) + "px";
  document.body.appendChild(heart);

  setTimeout(function() {
    heart.remove();
  }, 5000);
}, 500);
</script>

</body>
</html>
